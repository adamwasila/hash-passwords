<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hash Passwords</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel" aria-label="Password generator">
        <label>
          <span>Site</span>
          <input id="site" type="text" value="example.com" autocomplete="off" autocapitalize="off" spellcheck="false" />
        </label>

        <label>
          <span>Password</span>
          <input id="password" type="password" autocomplete="current-password" />
        </label>

        <label>
          <span>Hash</span>
          <div class="field-inline">
            <canvas id="hash-identicon" class="hash-identicon" width="30" height="30" aria-hidden="true"></canvas>
            <input id="hashed" type="password" readonly autocomplete="off" spellcheck="false" />
            <button id="toggle-visibility" type="button" class="icon-button" aria-label="Show hash" title="Show hash">
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M12 5C7 5 3.2 8 1.6 12C3.2 16 7 19 12 19C17 19 20.8 16 22.4 12C20.8 8 17 5 12 5ZM12 17C9.2 17 7 14.8 7 12C7 9.2 9.2 7 12 7C14.8 7 17 9.2 17 12C17 14.8 14.8 17 12 17Z" />
                <circle cx="12" cy="12" r="2.6" />
              </svg>
            </button>
            <button id="copy-hash" type="button" class="icon-button" aria-label="Copy hash" title="Copy hash">
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M8 3C6.9 3 6 3.9 6 5V7H7.8V5H16V16H14V17.8H16C17.1 17.8 18 16.9 18 15.8V5C18 3.9 17.1 3 16 3H8Z" />
                <path d="M5 6.2C3.9 6.2 3 7.1 3 8.2V19C3 20.1 3.9 21 5 21H13.8C14.9 21 15.8 20.1 15.8 19V8.2C15.8 7.1 14.9 6.2 13.8 6.2H5ZM5 8H13.8V19H5V8Z" />
              </svg>
            </button>
            <button
              id="algo-sha256"
              type="button"
              class="algo-toggle-button is-active"
              aria-pressed="true"
              title="Press to use the new PBKDF2-SHA256 algorithm. Unpressed keeps original MD5 behavior compatible with PwdHash."
              aria-label="Toggle SHA256 algorithm"
            >
              SHA256
            </button>
          </div>
        </label>

      </section>
      <div class="password-timeout" aria-hidden="true">
        <div id="password-timeout-bar" class="password-timeout-bar"></div>
      </div>
    </main>

    <script src="md5.js"></script>
    <script src="domain-extractor.js"></script>
    <script src="hashed-password.js"></script>
    <script src="pwdhash-core.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
