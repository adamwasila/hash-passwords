name: Build Firefox Release Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate tag matches manifest version
        shell: bash
        run: |
          set -euo pipefail

          VERSION="$(jq -r '.version' manifest.json)"
          EXPECTED_TAG="v${VERSION}"

          ACTUAL_TAG=""
          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            ACTUAL_TAG="${{ github.event.release.tag_name }}"
          elif [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            ACTUAL_TAG="${GITHUB_REF_NAME}"
          fi

          if [[ -n "${ACTUAL_TAG}" && "${ACTUAL_TAG}" != "${EXPECTED_TAG}" ]]; then
            echo "Version mismatch: manifest.json is '${VERSION}', but tag is '${ACTUAL_TAG}' (expected '${EXPECTED_TAG}')."
            exit 1
          fi

          if [[ -n "${ACTUAL_TAG}" ]]; then
            echo "Tag/version check passed: ${ACTUAL_TAG} matches manifest.json version ${VERSION}."
          else
            echo "No tag context detected; skipping tag/version validation."
          fi

      - name: Build extension zip (without CLI)
        shell: bash
        run: |
          ./scripts/build-package.sh
          PACKAGE_PATH="$(ls -1 dist/*.zip | head -n 1)"
          [[ -n "${PACKAGE_PATH}" && -f "${PACKAGE_PATH}" ]] || { echo "No package zip found in dist/"; exit 1; }
          echo "PACKAGE_PATH=${PACKAGE_PATH}" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: firefox-extension-package
          path: ${{ env.PACKAGE_PATH }}
          if-no-files-found: error

      - name: Create or update GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ env.PACKAGE_PATH }}